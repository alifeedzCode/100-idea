<style>
  :root {
    --bg: #080810;
    --surface: #0f0f1a;
    --border: rgba(255,255,255,0.07);
    --accent1: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --accent4: #ec4899;
    --text: #e2e8f0;
    --muted: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(124,58,237,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.1) 0%, transparent 50%),
      radial-gradient(ellipse 40% 60% at 60% 30%, rgba(236,72,153,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 5rem 0 3rem;
    text-align: center;
  }

  .badge {
    display: inline-block;
    background: rgba(124,58,237,0.2);
    border: 1px solid rgba(124,58,237,0.5);
    color: #a78bfa;
    padding: 0.4rem 1.2rem;
    border-radius: 100px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, #a78bfa 40%, #06b6d4 80%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 1rem;
  }

  .subtitle {
    color: var(--muted);
    font-size: 1.1rem;
    max-width: 500px;
    margin: 0 auto 3rem;
    line-height: 1.6;
  }

  /* Stats bar */
  .stats {
    display: flex;
    justify-content: center;
    gap: 3rem;
    margin-bottom: 4rem;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Unbounded', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Category filters */
  .filters {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 3rem;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.5rem 1.2rem;
    border-radius: 100px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    font-weight: 500;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--accent1);
    border-color: var(--accent1);
    color: white;
  }

  /* Search */
  .search-wrap {
    max-width: 500px;
    margin: 0 auto 3rem;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.9rem 1rem 0.9rem 3rem;
    border-radius: 12px;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus {
    border-color: var(--accent1);
  }

  .search-wrap::before {
    content: '🔍';
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.9rem;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
    margin-bottom: 5rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    cursor: pointer;
    animation: fadeIn 0.4s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    border-color: rgba(124,58,237,0.4);
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(124,58,237,0.2);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--card-accent, linear-gradient(90deg, var(--accent1), var(--accent2)));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover::before {
    opacity: 1;
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 0.8rem;
  }

  .card-num {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.65rem;
    font-weight: 900;
    color: var(--muted);
    background: rgba(255,255,255,0.05);
    width: 2rem;
    height: 2rem;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    letter-spacing: 0;
  }

  .card-emoji {
    font-size: 1.8rem;
    flex-shrink: 0;
  }

  .card-title {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.3;
    color: #fff;
  }

  .card-desc {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 1rem;
  }

  .card-footer {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .tag {
    font-size: 0.7rem;
    padding: 0.25rem 0.6rem;
    border-radius: 6px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .tag-cat {
    background: rgba(124,58,237,0.15);
    color: #a78bfa;
    border: 1px solid rgba(124,58,237,0.3);
  }

  .tag-rev {
    background: rgba(6,182,212,0.1);
    color: #67e8f9;
    border: 1px solid rgba(6,182,212,0.2);
    margin-left: auto;
  }

  .difficulty {
    display: flex;
    gap: 3px;
    margin-left: auto;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
  }

  .dot.filled { background: var(--accent3); }

  /* Hidden */
  .card.hidden { display: none; }

  /* Footer */
  footer {
    text-align: center;
    padding: 3rem 0;
    color: var(--muted);
    font-size: 0.85rem;
    border-top: 1px solid var(--border);
  }

  .no-results {
    text-align: center;
    padding: 4rem;
    color: var(--muted);
    display: none;
    grid-column: 1/-1;
  }

  .no-results.show { display: block; }
</style>

let currentFilter = 'all';

function renderCards(filtered) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results show">😢 Тохирох санаа олдсонгүй. Өөр хайлт туршина уу.</div>';
    return;
  }

  const accents = [
    'linear-gradient(90deg, #7c3aed, #06b6d4)',
    'linear-gradient(90deg, #ec4899, #f59e0b)',
    'linear-gradient(90deg, #10b981, #06b6d4)',
    'linear-gradient(90deg, #f59e0b, #ef4444)',
    'linear-gradient(90deg, #6366f1, #8b5cf6)',
  ];

  filtered.forEach((idea, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.cat = idea.cat;
    card.style.cssText = `--card-accent: ${accents[i % accents.length]}; animation-delay: ${(i % 12) * 0.05}s`;
    
    const dots = [1,2,3,4].map(d => `<div class="dot ${d <= idea.diff ? 'filled' : ''}"></div>`).join('');

    card.innerHTML = `
      <div class="card-header">
        <div class="card-num">${String(idea.n).padStart(2,'0')}</div>
        <span class="card-emoji">${idea.emoji}</span>
        <div class="card-title">${idea.title}</div>
      </div>
      <div class="card-desc">${idea.desc}</div>
      <div class="card-footer">
        <span class="tag tag-cat">${catLabel(idea.cat)}</span>
        <span class="tag tag-rev">💰 ${idea.rev}</span>
        <div class="difficulty" title="Хэрэгжүүлэх хэцүү байдал">${dots}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function catLabel(cat) {
  const map = { saas:'SaaS', marketplace:'Маркетплэйс', ai:'AI', fintech:'Fintech', education:'Боловсрол', health:'Эрүүл мэнд', ecommerce:'E-Commerce', social:'Нийгэм', tools:'Хэрэглүүр' };
  return map[cat] || cat;
}

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = ideas.filter(idea => {
    const matchCat = currentFilter === 'all' || idea.cat === currentFilter;
    const matchQ = !q || idea.title.toLowerCase().includes(q) || idea.desc.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  renderCards(filtered);
}

// Initial render
renderCards(ideas);
</script>
